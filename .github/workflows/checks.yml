name: Code Checks Template

on:
  # Вызывается из главного пайплайна (push в main)
  workflow_call:
  # Запускается автоматически при создании Pull Request в main
  pull_request:
    branches: [main]

jobs:
  run_checks:
    name: Node.js ${{ matrix.node-version }}
    runs-on: ${{ matrix.os }}

    # Безопасное чтение флага: если experimental не задан, возвращаем false
    continue-on-error: ${{ matrix.experimental || false }}

    strategy:
      fail-fast: false
      matrix:
        node-version: [24, 26]
        os: [ubuntu-latest]
        include:
          - node-version: 26
            experimental: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build project
        run: yarn build
